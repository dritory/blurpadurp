# Fly.io app config for blurpadurp. See docs/deploy.md for the full
# provisioning recipe (Postgres + pgvector, secrets, scheduled machines
# for the pipeline). Adjust `app` and `primary_region` to your Fly org.

app = "blurpadurp"
primary_region = "ams"

[build]

# Runs once per deploy after the image builds, before any app machine
# rolls. If it exits non-zero the deploy aborts — so code can't ship
# referencing columns a migration hasn't applied yet. Has access to
# all Fly secrets (DATABASE_URL etc).
[deploy]
  release_command = "bun run migrate"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  BLURPADURP_PUBLIC_URL = "https://blurpadurp.fly.dev"

# Single HTTP service handling port 80 + 443 with auto-TLS. Fly's
# modern pattern — don't mix with [[services]], that triggers the
# "conflicting service definitions on port 443" error.
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"
